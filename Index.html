:root{
  --green:#1c352d;   /* Jungle Green — الأساسي */
  --green2:#555d50;  /* Ebony */
  --olive:#f4f0ec;   /* الخلفية — Isabelline */
  --sage:#adadac;    /* Gray — ثانوي */
  --gold:#c9a03a;    /* ذهبي */
  --gold2:#f4f0ec;   /* فاتح للنصوص على الداكن */
  --wine:#a5802a;    /* ذهبي داكن */
  --ivory:#ffffff;   /* البطاقات */
  --ink:#242b23; --line:#d9d4cc; --red:#7a3021; --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Playpen Sans Arabic',sans-serif;background:var(--olive);color:var(--ink)}
.num{font-family:'Playpen Sans Arabic',sans-serif;font-variant-numeric:lining-nums;direction:ltr;unicode-bidi:embed}
h1,h2,h3,.display{font-family:'Massir Ballpoint','Playpen Sans Arabic',sans-serif;font-weight:700}
.welcome{font-family:'Massir Ballpoint','Playpen Sans Arabic',sans-serif}
button{font-family:inherit;cursor:pointer;border:none;background:none}
img{display:block}

/* ===== Top bar ===== */
.welcome{background:var(--green);color:#fff;text-align:center;padding:12px 16px;font-size:20px;letter-spacing:.3px}
header{position:sticky;top:0;z-index:50;background:var(--green);border-bottom:1px solid rgba(242,238,227,.2)}
.nav{display:flex;align-items:center;justify-content:space-between;max-width:1200px;margin:auto;padding:10px 16px;gap:8px}
.nav-side{display:flex;gap:4px;flex:1}
.nav-side.end{justify-content:flex-end}
.icon-btn{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;color:var(--gold2);transition:.2s;position:relative}
.icon-btn:hover,.icon-btn:focus-visible{background:var(--green);color:var(--gold2);outline:none}
.icon-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.badge{position:absolute;top:0;inset-inline-end:0;background:var(--gold);color:#fff;font-size:10px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:grid;place-items:center;padding:0 3px}
.logo{text-align:center;line-height:1}
.logo-img{height:56px;width:auto;margin:auto;transition:.2s}
.logo button:hover .logo-img{transform:scale(1.05)}
.f-logo{height:74px;width:auto;margin-bottom:10px}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.logo button{color:var(--green)}
.logo .star{color:var(--gold);font-size:13px;display:block}
.logo h1{font-size:26px}

/* ===== Dropdown categories ===== */
.drop{position:absolute;top:calc(100% + 4px);inset-inline-start:16px;background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 14px 40px rgba(13,58,45,.18);min-width:240px;max-height:70vh;overflow:auto;display:none;padding:8px}
.drop.open{display:block}
.drop button{width:100%;text-align:start;padding:10px 14px;border-radius:8px;font-size:15px;color:var(--ink)}
.drop button:hover{background:var(--ivory);color:var(--green)}
.drop .sub{padding-inline-start:28px;font-size:13.5px;color:#5a6660}
.drop .grp{font-weight:700;color:var(--green)}
.ci{display:inline-grid;place-items:center;width:22px;height:22px;margin-inline-end:6px;vertical-align:middle;color:var(--green2)}
.ci svg{width:19px;height:19px}
.drop button{display:flex;align-items:center}
.chip{display:inline-flex;align-items:center}
.chip.on .ci{color:var(--gold2)}
.drop .sub .ci svg{width:16px;height:16px}

/* ===== Hero carousel ===== */
.carousel{position:relative;max-width:1200px;margin:18px auto;padding:0 16px}
.slides{position:relative;height:340px;border-radius:var(--radius);overflow:hidden;background:var(--green)}
.slide{position:absolute;inset:0;opacity:0;transition:opacity .6s;display:flex;align-items:flex-end}
.slide.active{opacity:1}
.slide img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.slide .cap{position:relative;z-index:2;width:100%;padding:22px;background:linear-gradient(transparent,rgba(18,33,28,.88));color:#fff}
.cap h2{color:var(--gold);font-size:26px}
.c-arrow{position:absolute;top:50%;transform:translateY(-50%);width:34px;height:34px;border-radius:50%;background:rgba(250,246,238,.92);color:var(--green);display:grid;place-items:center;z-index:3;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.c-arrow svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
html[dir="rtl"] .c-arrow svg{transform:scaleX(-1)}
.c-prev{inset-inline-start:28px}.c-next{inset-inline-end:28px}
.dots{position:absolute;bottom:12px;left:0;right:0;display:flex;justify-content:center;gap:6px;z-index:3}
.dots span{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.5);cursor:pointer}
.dots span.on{background:var(--gold)}

/* ===== Sections ===== */
.section{max-width:1200px;margin:auto;padding:30px 16px}
.sec-title{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.sec-title h2{color:var(--green);font-size:28px;white-space:nowrap}
.sec-title::before,.sec-title::after{content:"";height:1px;background:#cfc9bf;flex:1}
.sec-title .g8{color:var(--gold);font-size:18px}

/* ===== Product cards / latest scroller ===== */
.scroller{display:flex;gap:16px;overflow-x:auto;padding-bottom:10px;scroll-snap-type:x mandatory}
.scroller::-webkit-scrollbar{height:8px}
.scroller::-webkit-scrollbar-thumb{background:var(--gold);border-radius:4px}
.card{background:var(--ivory);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;min-width:220px;max-width:240px;scroll-snap-align:start;flex:0 0 auto;display:flex;flex-direction:column;transition:.2s}
@media(hover:hover){.card:hover{box-shadow:0 10px 26px rgba(13,58,45,.14);transform:translateY(-3px)}}
.grid .card{min-width:0;max-width:none}
.card .ph{height:170px;background:var(--green2) center/cover no-repeat;position:relative}
.card .fav{position:absolute;top:8px;inset-inline-end:8px;width:34px;height:34px;border-radius:50%;background:rgba(250,246,238,.92);display:grid;place-items:center;color:var(--green)}
.card .fav svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}
.card .fav.on svg{fill:var(--wine);stroke:var(--wine)}
.card .bd{padding:12px 14px;display:flex;flex-direction:column;gap:6px;flex:1}
.card .nm{font-weight:700;font-size:15px;font-family:'Segoe UI',Tahoma,'Noto Sans Arabic',Arial,sans-serif}
#prodDetail h3:first-of-type{font-family:'Segoe UI',Tahoma,'Noto Sans Arabic',Arial,sans-serif;font-weight:700}
.cart-item div:first-of-type+div>div:first-child{font-family:'Segoe UI',Tahoma,Arial,sans-serif}
.card .ct{font-size:12px;color:#77816f}
.card .pr{color:var(--green);font-weight:700;font-size:17px;margin-top:auto}
.card .add{background:var(--green);color:var(--gold2);border-radius:9px;padding:9px;font-size:14px;margin-top:8px;transition:.2s}
.card .add:hover{background:var(--green2)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:16px}

/* ===== Category icons grid ===== */
.cat-icons{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:14px}
.cat-tile{background:rgba(255,255,255,.6);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);border:1px solid var(--line);border-radius:var(--radius);padding:16px 8px;display:flex;flex-direction:column;align-items:center;gap:8px;transition:.2s}
.cat-tile .tic{width:44px;height:44px;border-radius:50%;background:var(--green);color:var(--gold);display:grid;place-items:center}
.cat-tile .tic svg{width:24px;height:24px}
.cat-tile span{font-size:13px;text-align:center;color:var(--ink)}
@media(hover:hover){.cat-tile:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(28,53,45,.3);background:rgba(244,240,236,.7)}}
.cat-tile:hover .tic{background:var(--gold);color:var(--green)}

/* ===== FAQ ===== */
.faq{max-width:820px;margin:auto}
.faq details{background:var(--ivory);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.faq summary{padding:16px 18px;cursor:pointer;font-weight:500;color:var(--green);list-style:none;display:flex;justify-content:space-between;align-items:center}
.faq summary::after{content:"+";color:var(--gold);font-size:22px;font-weight:400}
.faq details[open] summary::after{content:"−"}
.faq p{padding:0 18px 16px;color:#4a544e;font-size:14.5px;line-height:1.8}

/* ===== Footer ===== */
footer{background:var(--green);color:var(--gold2);margin-top:40px}
.f-in{max-width:1200px;margin:auto;padding:34px 16px;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:24px}
footer h3{color:var(--gold2);margin-bottom:10px;font-size:20px}
footer a,footer p{color:var(--ivory);text-decoration:none;font-size:14.5px;line-height:2}
footer a:hover{color:var(--gold2)}
.f-bar{border-top:1px solid rgba(216,208,194,.25);text-align:center;padding:12px;font-size:13px;color:var(--gold2)}
.socials{display:flex;gap:10px;margin-top:12px}

async function sbFetch(path, opts={}){
  const r = await fetch(SB_URL + "/rest/v1/" + path, {
    method: opts.method || "GET",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json",
      Prefer: opts.prefer || "return=minimal",
    },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if(!r.ok) throw new Error("Supabase: " + (await r.text()));
  const txt = await r.text();
  return txt ? JSON.parse(txt) : null;
}
async function sbSelect(table, query=""){ return (await sbFetch(table + "?select=*" + query, {prefer:"return=representation"})) || []; }
async function sbReplaceAll(table, rows, idCol){
  // استبدال كامل: حذف غير الموجود ثم upsert — مناسب لجداولنا الصغيرة
  const existing = await sbSelect(table);
  const keep = new Set(rows.map(r=>String(r[idCol])));
  const toDel = existing.filter(r=>!keep.has(String(r[idCol]))).map(r=>r[idCol]);
  if(toDel.length){
    const vals = toDel.map(v=>typeof v==="string"?'"'+v+'"':v).join(",");
    await sbFetch(`${table}?${idCol}=in.(${encodeURIComponent(vals)})`, {method:"DELETE"});
  }
  if(rows.length){
    await sbFetch(table + "?on_conflict=" + idCol, {method:"POST", body:rows, prefer:"resolution=merge-duplicates,return=minimal"});
  }
}

      case "cats":     return await sbReplaceAll("categories",(val||[]).map((c,i)=>({...M.catRow(c),sort:i})),"id");
      case "faqs":     return await sbReplaceAll("faqs",(val||[]).map(M.faqRow),"id");
      case "slides":   return await sbReplaceAll("slides",(val||[]).map(M.slideRow),"id");
      case "orders":   return await sbReplaceAll("orders",(val||[]).map(o=>({id:o._id||undefined,...M.orderRow(o)})).map(r=>{if(r.id===undefined)delete r.id;return r;}),"id");
      case "coupons":  return await sbReplaceAll("coupons",Object.entries(val||{}).map(([code,percent])=>({code,percent})),"code");
      case "users":    return await sbReplaceAll("buyers",Object.entries(val||{}).map(([phone,u])=>({phone,name:u.name,pass_hash:u.h||"",created_at:new Date(u.d||Date.now()).toISOString(),demo:!!u.demo})),"phone");
      case "reviews":  { const rows=[]; Object.entries(val||{}).forEach(([pid,list])=>list.forEach(r=>rows.push({id:r._id||undefined,product_id:+pid,name:r.n,rating:r.r,body:r.t,d:new Date(r.d||Date.now()).toISOString()})));
                         return await sbReplaceAll("reviews",rows.map(r=>{if(r.id===undefined)delete r.id;return r;}),"id"); }
      default:         return await sbFetch("settings?on_conflict=key",{method:"POST",body:[{key,value:val}],prefer:"resolution=merge-duplicates,return=minimal"});
    }
  }catch(e){ console.error("sSet",key,e); }
}

let slideIdx=0, slideTimer=null;
const SLIDE_BG=["linear-gradient(135deg,#1c352d,#555d50)","linear-gradient(135deg,#555d50,#adadac)","linear-gradient(135deg,#c9a03a,#1c352d)"];
function slidesData(){
  const L=t();
  if(customSlides.length) return customSlides.map(s=>({img:s.img||"",title:s.title||"",sub:s.sub||""}));
  return L.slides.map(s=>({img:"",title:s[0],sub:s[1]}));
}
function renderSlides(){
  const box=document.getElementById("slides"); box.innerHTML="";
  const list=slidesData();
  if(slideIdx>=list.length) slideIdx=0;
  list.forEach((s,i)=>{
    const d=document.createElement("div"); d.className="slide"+(i===slideIdx?" active":"");
    d.style.background=SLIDE_BG[i%SLIDE_BG.length];
    d.innerHTML=`${s.img?`<img src="${s.img}" alt="">`:""}<div class="cap">${s.title?`<h2>${s.title}</h2>`:""}${s.sub?`<p>${s.sub}</p>`:""}</div>`;
    box.appendChild(d);
  });
  const dots=document.getElementById("dots"); dots.innerHTML="";
  list.forEach((_,i)=>{
    const sp=document.createElement("span"); if(i===slideIdx) sp.classList.add("on");
    sp.onclick=()=>{slideIdx=i;renderSlides();resetSlideTimer();};
    dots.appendChild(sp);
  });
}
function moveSlide(dir){ const n=slidesData().length; slideIdx=(slideIdx+dir+n)%n; renderSlides(); resetSlideTimer(); }
function resetSlideTimer(){ clearInterval(slideTimer); slideTimer=setInterval(()=>moveSlide(1),5000); }

function productCard(p){
  const L=t();
  const card=document.createElement("div"); card.className="card"+(p.soldout?" sold":"");
  const isFav=favs.includes(p.id);
  const catLabel = catName(p.cat);
  const onSale=p.oldPrice && p.oldPrice>p.price;
  const salePct=onSale?Math.round((1-p.price/p.oldPrice)*100):0;
  let badges="";
  if(onSale) badges+=`<span class="bsale num">-${salePct}%</span>`;
  if(p.isNew) badges+=`<span class="bnew">${L.newBadge}</span>`;
  if(p.soldout) badges+=`<span class="bsold">${L.soldout}</span>`;
  card.innerHTML=`
    <div class="ph" ${p.img?`style="background:url('${p.img}') ${p.pos?`${p.pos.x}% ${p.pos.y}%`:"center"}/cover no-repeat, #e6e1d6"`:""}>
      ${badges?`<div class="pbadge">${badges}</div>`:""}
      <button class="fav ${isFav?"on":""}" aria-label="favorite"><svg viewBox="0 0 24 24"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21.2l7.8-7.8 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg></button>
    </div>
    <div class="bd">
      <span class="nm">${p.name[lang]||p.name.ar}</span>
      <span class="ct">${catLabel}</span>
      ${cardStars(p.id)}
      <span class="pr num">${fmt(p.price)}${onSale?`<span class="oldpr num">${fmt(p.oldPrice)}</span>`:""}</span>
      <button class="add" ${p.soldout?"disabled":""}>${p.soldout?L.soldout:L.detailsBtn}</button>
    </div>`;
  card.querySelector(".fav").onclick=e=>{e.stopPropagation();toggleFav(p.id);};
  if(!p.soldout) card.querySelector(".add").onclick=e=>{
    e.stopPropagation();
    if(p.variants&&p.variants.length){showProduct(p);return;}  // يجب اختيار اللون أولاً
    addToCart(p.id);
  };
  card.querySelector(".bd .nm").onclick=()=>showProduct(p);
  card.querySelector(".ph").onclick=()=>showProduct(p);
  return card;
}
function avgRating(pid){
  const list=reviewsAll[pid]||[];
  if(!list.length) return null;
  return [list.reduce((a,r)=>a+r.r,0)/list.length, list.length];
}
function cardStars(pid){
  const a=avgRating(pid);
  if(!a) return "";
  const full=Math.round(a[0]);
  return `<span class="rate">${"★".repeat(full)}${"☆".repeat(5-full)} <span class="rc num">(${a[1]})</span></span>`;
}

  currentCat=cat||currentCat;
  const L=t();
  const fl=document.getElementById("shopFilters"); fl.innerHTML="";
  const flat=[["all",L.cats.all,CAT_ICONS.all]];
  catsList().forEach(c=>flat.push([c.id,catName(c.id),catIcon(c.id)]));
  flat.forEach(([id,label,icon])=>{
    const b=document.createElement("button"); b.className="chip"+(id===currentCat?" on":"");
    b.innerHTML=`<span class="ci">${icon}</span> ${label}`; b.onclick=()=>renderShop(id); fl.appendChild(b);
  });
  const g=document.getElementById("shopGrid"); g.innerHTML="";

  g.classList.toggle("view2", shopView==="grid");
  const vl=document.getElementById("viewListBtn"), vg=document.getElementById("viewGridBtn");
  vl.classList.toggle("on",shopView==="list"); vg.classList.toggle("on",shopView==="grid");
  vl.onclick=()=>{shopView="list";sSet("view",shopView);renderShop(currentCat);};
  vg.onclick=()=>{shopView="grid";sSet("view",shopView);renderShop(currentCat);};
  const q=document.getElementById("searchInput").value.trim().toLowerCase();
  let list=products.filter(p=>currentCat==="all" || p.cat===currentCat);
  if(q) list=list.filter(p=>Object.values(p.name).join(" ").toLowerCase().includes(q));
  if(shopSort==="priceAsc") list.sort((a,b)=>a.price-b.price);
  else if(shopSort==="priceDesc") list.sort((a,b)=>b.price-a.price);
  else if(shopSort==="newest") list.sort((a,b)=>b.id-a.id);
  else if(shopSort==="rated") list.sort((a,b)=>((avgRating(b.id)||[0])[0])-((avgRating(a.id)||[0])[0]));
  list.forEach(p=>g.appendChild(productCard(p)));
  const sc=document.getElementById("searchCount");
  if(q){ sc.style.display="block"; sc.innerHTML=`<span class="num">${list.length}</span> ${t().resultsWord}`; }
  else sc.style.display="none";
  document.getElementById("shopEmpty").style.display=list.length?"none":"block";

function addToCart(id, v){
  v=v||null;
  const it=cart.find(c=>c.id===id && (c.v||null)===v);
  if(it) it.qty++; else cart.push({id,qty:1,v});

function updateBadges(){
  const cb=document.getElementById("cartBadge");
  const total=cart.reduce((s,c)=>s+c.qty,0);
  cb.textContent=total; cb.style.display=total?"grid":"none";

function effectiveUnit(p){
  // الخصم الأكبر: خصم المنتج أو الكوبون (لا يُجمعان)
  const pct=(appliedCoupon&&coupons[appliedCoupon])?coupons[appliedCoupon]:0;
  if(!pct) return p.price;
  const base=(p.oldPrice&&p.oldPrice>p.price)?p.oldPrice:p.price;
  const couponPrice=base*(1-pct/100);
  return Math.min(p.price, couponPrice);
}
function renderCart(){
  const L=t(); const box=document.getElementById("cartItems"); box.innerHTML="";
  if(!cart.length){
    box.innerHTML=`<div class="empty-cart"><div class="ec-ico">🛍️</div><p>${L.emptyCartMsg}</p><button class="btn" id="ecShop">${L.shopNow}</button></div>`;
    box.querySelector("#ecShop").onclick=()=>{closeOverlay("cartOverlay");go("shop","all");};
  }
  let total=0;
  cart.forEach(c=>{
    const p=products.find(x=>x.id===c.id); if(!p) return;
    total+=p.price*c.qty;
    const d=document.createElement("div"); d.className="cart-item";
    d.innerHTML=`
      <div class="th" ${p.img?`style="background-image:url('${p.img}')"`:""}></div>
      <div style="flex:1"><div>${p.name[lang]||p.name.ar}${c.v?` — <b style="color:var(--green)">${c.v}</b>`:""}</div><div class="muted num">${fmt(p.price)}</div></div>
      <div class="qty"><button>−</button><span class="num">${c.qty}</span><button>+</button></div>`;
    const [minus,plus]=d.querySelectorAll(".qty button");
    minus.onclick=()=>{c.qty--; if(c.qty<=0)cart=cart.filter(x=>x!==c); renderCart(); updateBadges(); saveCart();};
    plus.onclick=()=>{c.qty++; renderCart(); updateBadges(); saveCart();};
    box.appendChild(d);
  });
  const effTotal=cart.reduce((s,c)=>{const p=products.find(x=>x.id===c.id);return p?s+effectiveUnit(p)*c.qty:s;},0);
  let line=`${L.total}: <span class="num">${fmt(effTotal)}</span>`;
  if(effTotal<total-0.001){
    line=`${L.total}: <span class="num" style="text-decoration:line-through;opacity:.6">${fmt(total)}</span> ← <span class="num">${fmt(effTotal)}</span> <span style="font-size:13px">(${L.discount})</span>`;
  }
  document.getElementById("cartTotal").innerHTML=line;
}
async function applyCoupon(){

  document.getElementById("couponMsgOk").style.display=ok?"block":"none";

}

function openExternal(url){
  let w=null;
  try{ w=window.open(url,"_blank"); }catch(e){}
  if(!w){
    // محاولة عبر رابط فعلي (تنجح في بعض البيئات التي تمنع window.open)
    const a=document.createElement("a");
    a.href=url; a.target="_blank"; a.rel="noopener";
    document.body.appendChild(a); a.click(); a.remove();
    // احتياط أخير: نسخ الرابط وإعلام المستخدم

async function sendWhatsApp(){
  if(!cart.length) return;
  const L=t();
  const name=document.getElementById("orderName").value.trim();
  const phone=normPhone(document.getElementById("orderPhone").value);
  const addr=document.getElementById("orderAddr").value.trim();
  const notes=document.getElementById("orderNotes").value.trim();
  const nameEl=document.getElementById("orderName"), phEl=document.getElementById("orderPhone");

    if(!phone) phEl.style.borderColor="var(--red)";
    toast(L.fillNamePhone);
    return;
  }
  const num=await nextOrderNum();
  let msg=`${L.orderMsg}\n${L.orderNum}: #${num}\n\n`;
  msg+=`${L.nameLbl}: ${name}\n`;
  msg+=`${L.phone}: ${phone}\n`;
  if(addr) msg+=`${L.addrLbl}: ${addr}\n`;
  msg+=`\n${L.itemsLbl}:\n`;
  let total=0;
  cart.forEach(c=>{
    const p=products.find(x=>x.id===c.id); if(!p)return;

    total+=unit*c.qty;
    msg+=`• ${p.name[lang]||p.name.ar}${c.v?` (${c.v})`:""} ×${c.qty} — ${fmt(unit*c.qty)}\n`;

  if(notes) msg+=`\n\n${L.notesLbl.replace(" (اختياري)","").replace(" (optional)","").replace(" (اختیاری)","")}: ${notes}`;
  const gross=cart.reduce((s,c)=>{const p=products.find(x=>x.id===c.id);return p?s+p.price*c.qty:s;},0);

async function hashPass(p){
  try{
    const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(p+"nusuk-salt"));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }catch(e){ return "plain:"+p; }
}

(function initFocusDrag(){
  const box=document.getElementById("focusBox");
  let dragging=false, sx=0, sy=0, ox=50, oy=50;
  const start=e=>{dragging=true; const p=e.touches?e.touches[0]:e; sx=p.clientX; sy=p.clientY; ox=imgPos.x; oy=imgPos.y; e.preventDefault();};
  const move=e=>{
    if(!dragging) return;
    const p=e.touches?e.touches[0]:e;
    // السحب يميناً يعرض يسار الصورة (حركة طبيعية كأنك تحرك الصورة نفسها)
    imgPos.x=Math.min(100,Math.max(0, ox-(p.clientX-sx)/2.2));
    imgPos.y=Math.min(100,Math.max(0, oy-(p.clientY-sy)/1.9));
    box.style.backgroundPosition=`${imgPos.x}% ${imgPos.y}%`;
    e.preventDefault();

function compressImage(file, maxSide=700, quality=0.72){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        let {width:w,height:h}=img;
        if(Math.max(w,h)>maxSide){ const k=maxSide/Math.max(w,h); w=Math.round(w*k); h=Math.round(h*k); }
        const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
        cv.getContext("2d").drawImage(img,0,0,w,h);
        resolve(cv.toDataURL("image/jpeg",quality));
      };
      img.onerror=reject;
      img.src=reader.result;
    };
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

let isCart=[];   // {id, qty, u}
let isDiscPct=0, isDiscAmt=0;   // حسم البيع الحالي
function isGross(){ return isCart.reduce((s,c)=>s+c.u*c.qty,0); }
function isDiscValue(){
  const g=isGross();
  let d=isDiscPct>0 ? g*isDiscPct/100 : isDiscAmt;
  return Math.min(Math.max(0,d), g);
}
function renderInstore(){
  const L=t();
  // نتائج البحث
  const q=(document.getElementById("isSearch").value||"").trim().toLowerCase();
  const res=document.getElementById("isResults"); res.innerHTML="";
  if(q){
    products.filter(p=>Object.values(p.name).join(" ").toLowerCase().includes(q)).slice(0,8).forEach(p=>{
      const d=document.createElement("div"); d.className="is-res";
      d.innerHTML=`<span>${p.name.ar} — <span class="num">${fmt(p.price)}</span></span><button>+</button>`;
      d.querySelector("button").onclick=()=>{
        const v=(p.variants&&p.variants.length)?p.variants[0]:null;
        const ex=isCart.find(c=>c.id===p.id&&(c.v||null)===v);
        if(ex) ex.qty++; else isCart.push({id:p.id,qty:1,u:p.price,v});
        document.getElementById("isSearch").value=""; renderInstore();
      };
      res.appendChild(d);
    });
  }
  // السطور المختارة
  const box=document.getElementById("isCart"); box.innerHTML="";
  let total=0;
  isCart.forEach((c,idx)=>{
    const p=products.find(x=>x.id===c.id); if(!p)return;
    total+=c.u*c.qty;
    const d=document.createElement("div"); d.className="is-line";
    const vSel=(p.variants&&p.variants.length)?`<select class="vsel" style="padding:5px;border:1px solid var(--line);border-radius:6px;font-size:12.5px">${p.variants.map(v=>`<option ${v===c.v?"selected":""}>${v}</option>`).join("")}</select>`:"";
    d.innerHTML=`<span class="nm2">${p.name.ar}</span>${vSel}
      <span class="qty2"><button>−</button><span class="num">${c.qty}</span><button>+</button></span>
      <label style="font-size:11.5px;color:#77816f">${L.unitPriceLbl}</label>
      <input class="up num" type="number" min="0" step="0.01" value="${c.u}" dir="ltr">
      <span class="num" style="font-weight:700;color:var(--green)">${fmt(c.u*c.qty)}</span>
      <button class="rm2">✕</button>`;
    const [minus,plus]=d.querySelectorAll(".qty2 button");
    minus.onclick=()=>{c.qty--; if(c.qty<=0)isCart.splice(idx,1); renderInstore();};
    plus.onclick=()=>{c.qty++; renderInstore();};
    d.querySelector(".up").onchange=e=>{c.u=Math.max(0,parseFloat(e.target.value)||0); renderInstore();};
    const vs=d.querySelector(".vsel");
    if(vs) vs.onchange=e=>{c.v=e.target.value;};
    d.querySelector(".rm2").onclick=()=>{isCart.splice(idx,1); renderInstore();};
    box.appendChild(d);
  });
  // صف الحسم والمجموع
  document.getElementById("isDiscRow").style.display=isCart.length?"block":"none";
  const disc=isDiscValue();
  const net=total-disc;
  const tEl=document.getElementById("isTotal");
  if(!isCart.length) tEl.innerHTML="";
  else if(disc>0)
    tEl.innerHTML=`${L.total}: <span class="num" style="text-decoration:line-through;opacity:.6">${fmt(total)}</span> ← <span class="num">${fmt(net)}</span> <span style="font-size:13px;font-weight:400">(${L.discount} <span class="num">${fmt(disc)}</span>)</span>`;
  else tEl.innerHTML=`${L.total}: <span class="num">${fmt(total)}</span>`;
  // تنبيه تجاوز 20%
  const high=total>0 && disc/total>0.2;
  const warn=document.getElementById("isDiscWarn");
  warn.style.display=high?"block":"none";
  warn.textContent=L.discHighWarn;
  document.getElementById("isDiscPct").classList.toggle("warn",high);
  document.getElementById("isDiscAmt").classList.toggle("warn",high);
  // حالة أزرار النسب السريعة
  document.querySelectorAll(".is-disc .dq").forEach(b=>b.classList.toggle("on", isDiscPct===parseInt(b.dataset.p)));
}

let anPeriod="day", anOrders=[], adminUnlocked=false;

function periodRange(){
  const now=new Date();
  const start=new Date(now);
  if(anPeriod==="day"){ start.setHours(0,0,0,0); return [start.getTime(), now.getTime()]; }
  if(anPeriod==="week"){ start.setDate(now.getDate()-6); start.setHours(0,0,0,0); return [start.getTime(), now.getTime()]; }
  if(anPeriod==="month"){ start.setDate(now.getDate()-29); start.setHours(0,0,0,0); return [start.getTime(), now.getTime()]; }
  if(anPeriod==="year"){ start.setFullYear(now.getFullYear()-1); start.setHours(0,0,0,0); return [start.getTime(), now.getTime()]; }
  // فترة مخصصة
  const f=document.getElementById("anFrom").value, tt=document.getElementById("anTo").value;
  const s=f?new Date(f+"T00:00:00").getTime():0;
  const e=tt?new Date(tt+"T23:59:59").getTime():Date.now();
  return [s,e];
}

let anCatSel="all", anSrcSel="all";
function itemMeta(i){
  // القسم والسعر لعنصر الطلب — الطلبات القديمة تُطابَق بالاسم
  let cat=i.cat, u=i.u;
  if(cat==null || u==null){
    const p=products.find(x=>x.id===i.id)||products.find(x=>x.name.ar===i.n);
    if(p){ if(cat==null) cat=p.cat; if(u==null) u=p.price; }
  }
  return {cat:cat||"?", sub:i.sub||null, rev:(u||0)*i.q};
}
function itemInCat(i){
  if(anCatSel==="all") return true;
  const m=itemMeta(i);
  return m.cat===anCatSel;
}
async function renderAnalytics(){
  const L=t();
  document.getElementById("anCustom").style.display = anPeriod==="custom"?"flex":"none";
  // أزرار الفترات
  const box=document.getElementById("anPeriods"); box.innerHTML="";
  [["day",L.periodDay],["week",L.periodWeek],["month",L.periodMonth],["year",L.periodYear],["custom",L.periodCustom]].forEach(([id,label])=>{
    const b=document.createElement("button"); b.className="chip"+(anPeriod===id?" on":"");
    b.textContent=label;
    b.onclick=()=>{anPeriod=id;renderAnalytics();};
    box.appendChild(b);
  });
  // فلتر القسم
  const cs=document.getElementById("anCat");
  cs.innerHTML="";
  const optAll=document.createElement("option"); optAll.value="all"; optAll.textContent=L.allCats; cs.appendChild(optAll);
  catsList().forEach(c=>{
    const o=document.createElement("option"); o.value=c.id; o.textContent=catName(c.id); cs.appendChild(o);
  });
  cs.value=anCatSel;
  cs.onchange=()=>{anCatSel=cs.value;renderAnalytics();};
  const ss=document.getElementById("anSrc");
  ss.innerHTML="";
  [["all",L.srcAll],["web",L.srcWeb],["store",L.srcStore]].forEach(([v,txt])=>{
    const o=document.createElement("option"); o.value=v; o.textContent=txt; ss.appendChild(o);
  });
  ss.value=anSrcSel;
  ss.onchange=()=>{anSrcSel=ss.value;renderAnalytics();};

  anOrders=(await sGet("orders",true))||[];
  const [s,e]=periodRange();
  let list=anOrders.filter(o=>o.d>=s&&o.d<=e&&!o.c);
  if(anSrcSel==="store") list=list.filter(o=>o.src==="store");
  else if(anSrcSel==="web") list=list.filter(o=>o.src!=="store");
  // عند اختيار قسم: تُحسب القيم من عناصر ذلك القسم فقط
  const scoped=list.map(o=>{
    const its=o.items.filter(itemInCat);
    return its.length?{d:o.d,items:its,rev:its.reduce((a,i)=>a+itemMeta(i).rev,0)}:null;
  }).filter(Boolean);
  const revenue=anCatSel==="all"?list.reduce((a,o)=>a+(o.total||0),0):scoped.reduce((a,o)=>a+o.rev,0);
  const items=scoped.reduce((a,o)=>a+o.items.reduce((x,i)=>x+i.q,0),0);
  document.getElementById("kOrders").textContent=scoped.length;
  document.getElementById("kRevenue").textContent=fmt(revenue);
  document.getElementById("kAvg").textContent=scoped.length?fmt(revenue/scoped.length):"$0";
  document.getElementById("kItems").textContent=items;

  // توزيع المبيعات حسب القسم (قيم ونسب) — للفترة كاملة
  const byCat={};
  let periodRev=0;
  list.forEach(o=>o.items.forEach(i=>{
    const m=itemMeta(i);
    byCat[m.cat]=(byCat[m.cat]||0)+m.rev;
    periodRev+=m.rev;
  }));
  const bcBox=document.getElementById("anByCat"); bcBox.innerHTML="";
  const bcList=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  if(!bcList.length) bcBox.innerHTML=`<p class="muted">${L.noData}</p>`;
  bcList.forEach(([cid,rev])=>{
    const pct=periodRev?Math.round(rev/periodRev*100):0;
    const d=document.createElement("div"); d.className="catbar";
    d.innerHTML=`<div class="cb-h"><b>${catName(cid)}</b><span class="num">${fmt(rev)} — ${pct}%</span></div>
      <div class="cb-track"><div class="cb-fill" style="width:${pct}%"></div></div>`;
    bcBox.appendChild(d);
  });

  // الأكثر طلباً: كمية + إيراد + نسبة (يتبع فلتر القسم)
  const counts={};
  scoped.forEach(o=>o.items.forEach(i=>{
    counts[i.n]=counts[i.n]||{q:0,rev:0};
    counts[i.n].q+=i.q; counts[i.n].rev+=itemMeta(i).rev;
  }));
  const topBox=document.getElementById("anTop"); topBox.innerHTML="";
  const top=Object.entries(counts).sort((a,b)=>b[1].rev-a[1].rev).slice(0,8);
  if(!top.length) topBox.innerHTML=`<p class="muted">${L.noData}</p>`;
  top.forEach(([n,v])=>{
    const pct=revenue?Math.round(v.rev/revenue*100):0;
    const d=document.createElement("div"); d.className="top-row";
    d.innerHTML=`<span>${n}</span><span class="tq num">×${v.q} — ${fmt(v.rev)} (${pct}%)</span>`;
    topBox.appendChild(d);
  });

  // مقارنة بالفترة السابقة المساوية
  const span=e-s;
  let prevList=anOrders.filter(o=>o.d>=s-span&&o.d<s&&!o.c);
  if(anSrcSel==="store") prevList=prevList.filter(o=>o.src==="store");
  else if(anSrcSel==="web") prevList=prevList.filter(o=>o.src!=="store");
  const prevScoped=prevList.map(o=>{
    const its=o.items.filter(itemInCat);
    return its.length?{items:its,rev:its.reduce((a,i)=>a+itemMeta(i).rev,0)}:null;
  }).filter(Boolean);
  const prevRev=anCatSel==="all"?prevList.reduce((a,o)=>a+(o.total||0),0):prevScoped.reduce((a,o)=>a+o.rev,0);
  const prevItems=prevScoped.reduce((a,o)=>a+o.items.reduce((x,i)=>x+i.q,0),0);
  const cmp=(cur,prev,el)=>{
    const box=document.getElementById(el);
    if(!prev){box.textContent="";box.className="cmp num";return;}
    const pct=Math.round((cur-prev)/prev*100);
    box.textContent=(pct>=0?"▲ +":"▼ ")+pct+"%";
    box.className="cmp num "+(pct>=0?"up":"down");
  };
  cmp(scoped.length,prevScoped.length,"kOrdersCmp");
  cmp(revenue,prevRev,"kRevenueCmp");
  cmp(scoped.length?revenue/scoped.length:0, prevScoped.length?prevRev/prevScoped.length:0, "kAvgCmp");
  cmp(items,prevItems,"kItemsCmp");

  // أفضل يوم وساعة
  const dayCount={}, hourCount={};
  scoped.forEach(o=>{
    const dt=new Date(o.d);
    const wd=dt.toLocaleDateString(lang==="ar"?"ar":(lang==="fa"?"fa":"en"),{weekday:"long"});
    dayCount[wd]=(dayCount[wd]||0)+1;
    hourCount[dt.getHours()]=(hourCount[dt.getHours()]||0)+1;
  });
  const bestDay=Object.entries(dayCount).sort((a,b)=>b[1]-a[1])[0];
  const bestHour=Object.entries(hourCount).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById("insTime").textContent=bestDay?`${bestDay[0]} — ${bestHour[0]}:00`:"—";

  // زبائن جدد مقابل عائدين (حسب أول طلب للهاتف عبر كل السجل)
  const firstOrder={};
  anOrders.filter(o=>!o.c&&o.p&&o.p!=="—").forEach(o=>{
    if(!firstOrder[o.p]||o.d<firstOrder[o.p]) firstOrder[o.p]=o.d;
  });
  const periodPhones=new Set(list.filter(o=>o.p&&o.p!=="—").map(o=>o.p));
  let newC=0,retC=0;
  periodPhones.forEach(ph=>{ if(firstOrder[ph]>=s) newC++; else retC++; });
  document.getElementById("insCust").textContent=`${newC} ${L.newCustLbl} | ${retC} ${L.retCustLbl}`;

  // معدل الإتمام
  const delivered=list.filter(o=>o.s).length;
  document.getElementById("insFulfill").textContent=list.length?Math.round(delivered/list.length*100)+"%":"—";

  // أداء الكوبونات في الفترة
  const cp={};
  list.filter(o=>o.coupon).forEach(o=>{
    cp[o.coupon]=cp[o.coupon]||{uses:0,rev:0,cost:0};
    cp[o.coupon].uses++; cp[o.coupon].rev+=o.total||0; cp[o.coupon].cost+=o.disc||0;
  });
  // حسومات المحل في الفترة
  const storeOrders=list.filter(o=>o.src==="store");
  const storeDisc=storeOrders.reduce((a,o)=>a+(o.disc||0),0);
  const storeRev=storeOrders.reduce((a,o)=>a+(o.total||0),0);
  const cpBox=document.getElementById("anCoupons"); cpBox.innerHTML="";
  if(storeDisc>0){
    const pctOf=storeRev+storeDisc>0?Math.round(storeDisc/(storeRev+storeDisc)*100):0;
    const d=document.createElement("div"); d.className="top-row";
    d.innerHTML=`<span style="font-weight:700">${L.storeDiscTitle}</span><span class="tq num">${fmt(storeDisc)} — ${pctOf}% ${L.ofStoreSales}</span>`;
    cpBox.appendChild(d);
  }
  const cpList=Object.entries(cp).sort((a,b)=>b[1].uses-a[1].uses);
  if(!cpList.length && !storeDisc) cpBox.innerHTML=`<p class="muted">${L.noCouponUse}</p>`;
  cpList.forEach(([code,v])=>{
    const d=document.createElement("div"); d.className="top-row";
    d.innerHTML=`<span class="num" style="font-weight:700">${code}</span><span class="tq num">${v.uses} ${L.usesLbl} — ${L.couponRevLbl} ${fmt(v.rev)}${v.cost?` — ${L.couponCostLbl} ${fmt(v.cost)}`:""}</span>`;
    cpBox.appendChild(d);
  });

  // منتجات راكدة (لم تُطلب أبداً أو منذ 60+ يوماً — عبر كل السجل)
  const lastOrdered={};
  anOrders.filter(o=>!o.c).forEach(o=>o.items.forEach(i=>{
    const key=i.id||i.n;
    if(!lastOrdered[key]||o.d>lastOrdered[key]) lastOrdered[key]=o.d;
  }));
  const now=Date.now(), cutoff=60*86400000;
  const staleBox=document.getElementById("anStale"); staleBox.innerHTML="";
  const stale=products.map(p=>{
    const lo=lastOrdered[p.id]||lastOrdered[p.name.ar];
    if(!lo) return {p,never:true};
    if(now-lo>cutoff) return {p,days:Math.floor((now-lo)/86400000)};
    return null;
  }).filter(Boolean).slice(0,15);
  if(!stale.length) staleBox.innerHTML=`<p class="muted">${L.noStale}</p>`;
  stale.forEach(x=>{
    const d=document.createElement("div"); d.className="top-row";
    d.innerHTML=`<span>${x.p.name[lang]||x.p.name.ar}</span><span class="tq" style="color:#a5802a">${x.never?L.neverOrdered:`${L.lastOrderLbl} <span class="num">${x.days}</span> ${L.dayWord}`}</span>`;
    staleBox.appendChild(d);
  });

  // زبائن خاملون
  const lastByPhone={}, nameByPhone={};
  anOrders.filter(o=>!o.c&&o.p&&o.p!=="—").forEach(o=>{
    if(!lastByPhone[o.p]||o.d>lastByPhone[o.p]){lastByPhone[o.p]=o.d;nameByPhone[o.p]=o.n;}
  });
  const dormBox=document.getElementById("anDormant"); dormBox.innerHTML="";
  const dorm=Object.entries(lastByPhone).filter(([,d])=>now-d>cutoff)
    .sort((a,b)=>a[1]-b[1]).slice(0,15);
  if(!dorm.length) dormBox.innerHTML=`<p class="muted">${L.noDormant}</p>`;
  dorm.forEach(([ph,dts])=>{
    const days=Math.floor((now-dts)/86400000);
    const d=document.createElement("div"); d.className="top-row";
    d.innerHTML=`<span>${nameByPhone[ph]} — <span class="num">${ph}</span></span>
      <span style="display:flex;gap:8px;align-items:center"><span class="tq" style="color:#a5802a">${L.lastOrderLbl} <span class="num">${days}</span> ${L.dayWord}</span>
      <button class="wa-mini"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.6 15.1L2 22l5-1.3A10 10 0 1 0 12 2zm5.5 14.1c-.2.7-1.3 1.3-1.8 1.3-.5.1-1 .2-3.3-.7-2.8-1.1-4.6-4-4.7-4.2-.1-.2-1.1-1.5-1.1-2.9s.7-2 1-2.3c.2-.3.5-.3.7-.3h.5c.2 0 .4 0 .6.5l.9 2.1c.1.2.1.4 0 .6l-.4.6-.5.5c-.1.2-.3.3-.1.6.2.3.8 1.4 1.8 2.2 1.3 1.1 2.3 1.5 2.6 1.6.3.1.5.1.7-.1l1-1.2c.2-.3.4-.2.7-.1l2 1c.3.1.5.2.6.3 0 .1 0 .8-.2 1.5z"/></svg></button></span>`;
    d.querySelector(".wa-mini").onclick=()=>openExternal("https://wa.me/"+ph.replace(/[^0-9]/g,""));
    dormBox.appendChild(d);
  });

  drawChart(anCatSel==="all"?list:scoped.map(o=>({d:o.d,total:o.rev})),s,e);
}

async function sendDailyReport(){
  const L=t();
  const orders=(await sGet("orders",true))||[];
  const dayStart=new Date(); dayStart.setHours(0,0,0,0);
  const today=orders.filter(o=>o.d>=dayStart.getTime()&&!o.c);

  const webRev=web.reduce((a,o)=>a+(o.total||0),0), storeRev=store.reduce((a,o)=>a+(o.total||0),0);
  const counts={};
  today.forEach(o=>o.items.forEach(i=>counts[i.n]=(counts[i.n]||0)+i.q));
  const top=Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,3);
  let msg=`${L.reportFor} ${new Date().toLocaleDateString("en-GB")}\n`;

function drawChart(list,s,e){
  const L=t();
  const cv=document.getElementById("anChart");
  const empty=document.getElementById("anEmpty");
  empty.textContent=L.noData;
  const days=(e-s)/86400000;
  // اختيار التجميع: ساعات لليوم، أيام حتى 92 يوماً، أشهر لما فوق
  let buckets=[], labels=[], keyFn, labFn;
  if(days<=1.1){
    keyFn=d=>new Date(d).getHours();
    for(let h=0;h<24;h++){buckets.push(0);labels.push(h+":00");}
  } else if(days<=92){
    const n=Math.ceil(days);
    keyFn=d=>Math.floor((d-s)/86400000);
    for(let i=0;i<n;i++){
      buckets.push(0);
      const dt=new Date(s+i*86400000);
      labels.push(dt.getDate()+"/"+(dt.getMonth()+1));
    }
  } else {
    const start=new Date(s), months=[];
    let cur=new Date(start.getFullYear(),start.getMonth(),1);
    while(cur.getTime()<=e){months.push(cur.getTime());cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);}
    keyFn=d=>{const x=new Date(d);const k=new Date(x.getFullYear(),x.getMonth(),1).getTime();return months.indexOf(k);};
    months.forEach(m=>{const dt=new Date(m);buckets.push(0);labels.push((dt.getMonth()+1)+"/"+String(dt.getFullYear()).slice(2));});
  }
  list.forEach(o=>{const k=keyFn(o.d); if(k>=0&&k<buckets.length) buckets[k]+=o.total||0;});
  const has=buckets.some(v=>v>0);
  cv.style.display=has?"block":"none";
  empty.style.display=has?"none":"block";
  if(!has) return;
  // الرسم
  const W=cv.parentElement.clientWidth-32 || 600;
  cv.width=W*2; cv.height=480; cv.style.height="240px";
  const ctx=cv.getContext("2d"); ctx.scale(2,2);
  const w=W, h=240, padB=28, padL=8, padT=14;
  const max=Math.max(...buckets)*1.15;
  const n=buckets.length;
  const gap=Math.max(2, n>40?1:4);
  const bw=Math.max(3,(w-padL*2)/n-gap);
  const css=getComputedStyle(document.documentElement);
  const cGreen=css.getPropertyValue("--green").trim(), cGold=css.getPropertyValue("--gold").trim(), cLine=css.getPropertyValue("--line").trim();
  ctx.clearRect(0,0,w,h);
  // خطوط أفقية
  ctx.strokeStyle=cLine; ctx.lineWidth=.5; ctx.fillStyle="#8a8f86"; ctx.font="9px sans-serif";
  for(let g=0;g<=3;g++){
    const y=padT+(h-padB-padT)*g/3;
    ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(w-padL,y);ctx.stroke();
    ctx.fillText("$"+Math.round(max*(3-g)/3), padL+2, y-3);
  }
  // الأعمدة
  buckets.forEach((v,i)=>{
    const x=padL+i*((w-padL*2)/n)+gap/2;
    const bh=v>0?Math.max(2,(v/max)*(h-padB-padT)):0;
    ctx.fillStyle=v>0?cGold:cLine;
    if(v>0) ctx.fillRect(x, h-padB-bh, bw, bh);
  });
  // تسميات المحور (متباعدة كي لا تتزاحم)
  ctx.fillStyle=cGreen; ctx.font="9.5px sans-serif"; ctx.textAlign="center";
  const step=Math.ceil(n/10);
  for(let i=0;i<n;i+=step){
    const x=padL+i*((w-padL*2)/n)+bw/2;
    ctx.fillText(labels[i], x, h-10);
  }
}

function periodLabel(){
  const L=t();
  const names={day:L.periodDay,week:L.periodWeek,month:L.periodMonth,year:L.periodYear};
  if(anPeriod!=="custom") return names[anPeriod];
  return (document.getElementById("anFrom").value||"…")+" ← "+(document.getElementById("anTo").value||"…");
}
function fdate(ts){ return new Date(ts).toLocaleString("en-GB",{day:"2-digit",month:"2-digit",year:"2-digit",hour:"2-digit",minute:"2-digit"}); }
function csvDownload(rows, filename){
  const csv="\ufeff"+rows.map(r=>r.map(c=>`"${String(c??"").replace(/"/g,'""')}"`).join(",")).join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));
  a.download=filename+".csv"; a.click(); URL.revokeObjectURL(a.href);
}
function sheetDownload(sheets, filename){
  // sheets: [[name, rows], ...] — إن توفرت مكتبة XLSX نصدر إكسل حقيقياً وإلا CSV
  if(typeof XLSX!=="undefined"){
    const wb=XLSX.utils.book_new();
    sheets.forEach(([name,rows])=>XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), name.slice(0,31)));
    XLSX.writeFile(wb, filename+".xlsx");
  } else {
    csvDownload(sheets.map(s=>s[1]).flat(), filename);
  }
}

async function exportAnalyticsXlsx(){
  const L=t();
  const [s,e]=periodRange();
  const list=((await sGet("orders",true))||[]).filter(o=>o.d>=s&&o.d<=e&&!o.c);
  const revenue=list.reduce((a,o)=>a+(o.total||0),0);
  const items=list.reduce((a,o)=>a+o.items.reduce((x,i)=>x+i.q,0),0);
  const summary=[[L.reportTitle],[L.periodLbl, periodLabel()],[],
    [L.ordersCount, list.length],[L.revenue, revenue.toFixed(2)],
    [L.avgOrder, list.length?(revenue/list.length).toFixed(2):0],[L.itemsSold, items]];
  const orders=[[L.orderNum,L.colDate,L.colBuyer,L.colPhone,L.colAddr,L.colItems,L.colCoupon,L.colTotal]];
  list.forEach(o=>orders.push([o.num?"#"+o.num:"", fdate(o.d), o.n, o.p||"", o.a, o.items.map(i=>`${i.n}${i.v?` (${i.v})`:""} ×${i.q}`).join("، "), o.coupon||"", (o.total||0).toFixed(2)]));
  const counts={};
  list.forEach(o=>o.items.forEach(i=>counts[i.n]=(counts[i.n]||0)+i.q));
  const top=[[L.topProducts,""]];
  Object.entries(counts).sort((a,b)=>b[1]-a[1]).forEach(([n,q])=>top.push([n,q]));
  sheetDownload([["Summary",summary],["Orders",orders],["Top",top]], "nusuk-sales-report");
}

document.getElementById("isDiscPct").addEventListener("input",e=>{isDiscPct=Math.min(100,Math.max(0,parseFloat(e.target.value)||0)); if(isDiscPct){isDiscAmt=0;document.getElementById("isDiscAmt").value="";} renderInstore();});
document.getElementById("isDiscAmt").addEventListener("input",e=>{isDiscAmt=Math.max(0,parseFloat(e.target.value)||0); if(isDiscAmt){isDiscPct=0;document.getElementById("isDiscPct").value="";} renderInstore();});
document.querySelectorAll(".is-disc .dq").forEach(b=>b.onclick=()=>{
  const p=parseInt(b.dataset.p);
  isDiscPct=(isDiscPct===p)?0:p; isDiscAmt=0;
  document.getElementById("isDiscPct").value=isDiscPct||"";
  document.getElementById("isDiscAmt").value="";
  renderInstore();
});
document.getElementById("isRegister").onclick=registerInstoreSale;
document.getElementById("receiptWABtn").onclick=sendReceiptWA;
document.getElementById("receiptPrintBtn").onclick=printReceipt;
document.getElementById("oSearch").addEventListener("input",()=>renderOrders());
document.getElementById("oStatus").addEventListener("change",()=>renderOrders());
document.getElementById("pSearch").addEventListener("input",()=>renderAdminList());
document.getElementById("btnShareStore").onclick=()=>{
  const L=t();
  const link=(location.href||"").split("#")[0];
  openExternal(`https://wa.me/?text=${encodeURIComponent(L.shareStoreMsg+"\n"+link)}`);
};
document.getElementById("demoClearBtn").onclick=clearDemoData;
document.getElementById("backupBtn").onclick=downloadBackup;
document.getElementById("restoreFile").onchange=e=>{if(e.target.files[0])restoreBackup(e.target.files[0]);e.target.value="";};
document.getElementById("uRegister").onclick=registerUser;
document.getElementById("uLogin").onclick=loginUser;
document.getElementById("uLogout").onclick=async()=>{member=null;await sSet("member",null);renderProfile();};
document.getElementById("adminEnter").onclick=adminEnter;
document.getElementById("adminPass").addEventListener("keydown",e=>{if(e.key==="Enter")adminEnter();});
document.getElementById("pSave").onclick=saveProduct;
document.getElementById("pCancel").onclick=()=>{editingId=null;["pNameAr","pNameEn","pNameFa","pPrice","pOldPrice","pImg","pDesc","pMaterial","pSize","pImgs"].forEach(id=>document.getElementById(id).value="");
  ["pNew","pBest","pSold"].forEach(id=>document.getElementById(id).checked=false);
  mainImgData=""; extraImgsData=[]; imgPos={x:50,y:50}; renderImgPreviews();document.getElementById("pCancel").style.display="none";};
document.getElementById("cPrev").onclick=()=>moveSlide(-1);
document.getElementById("cNext").onclick=()=>moveSlide(1);
document.querySelectorAll("[data-close]").forEach(b=>b.onclick=()=>closeOverlay(b.dataset.close));
document.querySelectorAll(".overlay").forEach(o=>o.onclick=e=>{if(e.target===o)o.classList.remove("open");});
document.addEventListener("click",e=>{if(!e.target.closest("header"))closeAllMenus();});

/* دخول الإدارة: أضف #admin إلى رابط الصفحة */
window.addEventListener("hashchange",()=>{if(location.hash==="#admin")go("admin");});
if(location.hash==="#admin")setTimeout(()=>go("admin"),100);

/* تحديث شبه لحظي في وضع Supabase */
if(typeof CLOUD!=="undefined" && CLOUD){
  setInterval(async()=>{
    try{
      if(adminUnlocked){
        renderQuickStats(); renderTileBadges();
        if(document.getElementById("ap-orders").classList.contains("open")) renderOrders();
        if(document.getElementById("page-analytics").classList.contains("active")) renderAnalytics();
      }
    }catch(e){}
  }, 30000);   // الطلبات والمؤشرات كل 30 ثانية
  setInterval(async()=>{
    try{
      const fresh=await sGet("products",true);
      if(fresh && JSON.stringify(fresh)!==JSON.stringify(products)){
        products=fresh;
        renderLatest(); renderSale(); renderBest();
        if(document.getElementById("page-shop").classList.contains("active")) renderShop(currentCat);
      }
    }catch(e){}
  }, 120000);  // المنتجات كل دقيقتين
}

(async function init(){
  const hl=document.querySelector(".logo-img");
  if(hl) document.getElementById("splashLogo").src=hl.src;
  const t0=Date.now();
  await loadState();
  applyLang();
  resetSlideTimer();
  // وضع الكاشير أو الدخول المحفوظ
  if(posMode){
    // حماية: جهاز الكاشير لا يحتفظ أبداً بدخول الإدارة الكاملة
    await localSet("adminRemember", null);
    go("admin");
    document.getElementById("adminTitle").textContent=t().posPinTitle;
    document.getElementById("adminPassLbl").textContent=t().posPinPrompt;
    document.getElementById("rememberChk").parentElement.style.display="none";
  } else {
    try{
      const rem=await localGet("adminRemember");
      if(rem && rem.until>Date.now()){ go("admin"); doAdminUnlock(); }
    }catch(e){}
  }
  const wait=Math.max(0, 600-(Date.now()-t0));
  setTimeout(()=>{
    const sp=document.getElementById("splash");
    if(sp){ sp.classList.add("hide"); setTimeout(()=>sp.remove(), 600); }
  }, wait);
})();
</script>
